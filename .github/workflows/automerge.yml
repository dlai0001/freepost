name: Auto-merge PRs

# Enables GitHub auto-merge (merge commit) on every pull request when it opens.
# With branch protection requiring the CI checks, the PR merges automatically
# once macos-latest and windows-latest pass. Draft PRs are skipped until marked
# ready. Requires the repo setting "Allow auto-merge" (already enabled).

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Enable auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --auto --merge
