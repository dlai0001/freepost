appId: io.github.dlai0001.freepost
productName: Freepost
directories:
  buildResources: build
  output: dist
# electron-vite compiles to out/; ship that plus production deps. Everything
# below is excluded from the packaged app (source, tests, tooling, docs).
files:
  - out/**
  - package.json
  - '!**/*.map'
  - '!src/**'
  - '!scripts/**'
  - '!docs/**'
  - '!examples/**'
  - '!**/*.test.*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vite.cli.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,PLAN.md,TEST_PLAN.md}'
# No auto-update / publish provider: Freepost never phones home, including for
# update checks. Installers are distributed manually (e.g. GitHub Releases).
# Artifact names are intentionally version-less so the website can link to
# stable URLs (github.com/.../releases/latest/download/<name>) that never break
# between releases. The release tag carries the version.
win:
  executableName: freepost
  target:
    - nsis
nsis:
  artifactName: ${name}-setup.${ext}
  shortcutName: ${productName}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.developer-tools
  # Universal binary so a single .dmg runs on both Intel and Apple Silicon.
  target:
    - target: dmg
      arch: universal
dmg:
  artifactName: ${name}-mac.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: dlaisoft
appImage:
  artifactName: ${name}.${ext}
deb:
  artifactName: ${name}.${ext}
npmRebuild: false
