name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The core promise: `git clone && npm install && build` works on both.
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Zero-network fence
        run: npm run fence
      - name: Build
        run: npm run build
      - name: Build CLI
        run: npm run build:cli
      # The unit suite imports the TypeScript source, so it cannot see bundling
      # faults. This runs the BUILT CLI against real HTTP/gRPC/MQTT servers — the
      # only check that would have caught .grpc and .mqtt being silently broken
      # by browser-vs-node module resolution.
      - name: CLI smoke test (built artifact)
        run: npm run smoke:cli
